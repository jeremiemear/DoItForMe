<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoItForMe</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Urbanist',sans-serif;
height:100vh;
background:linear-gradient(135deg,#84FAB0,#8FD3F4,#a6c0fe,#f68084);
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:60px;
border-radius:24px;
width:480px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

h1{
font-weight:900;
font-style:italic;
font-size:48px;
margin-bottom:10px;
}

button{
width:100%;
padding:18px;
font-size:18px;
font-weight:700;
border:none;
border-radius:14px;
margin-top:30px;
cursor:pointer;
background:linear-gradient(135deg,#84FAB0,#8FD3F4);
transition:.3s;
}

button:hover{ transform:scale(1.05); }
</style>
</head>

<body>
<div class="card">
<h1>DoItForMe</h1>
<p>Organise automatiquement ta bibliothèque Spotify par sous‑genres.</p>
<button onclick="window.location.href='/api/login'">
Se connecter avec Spotify
</button>
</div>
</body>
</html>
